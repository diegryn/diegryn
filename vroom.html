<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Gryn</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

img {
  width: 100%;
  display: block;
}

body {
  font-family: sans-serif;
  overflow-x: hidden;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 0 20px;
}

/* HEADER */
.header {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 10;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.header a {
  color: white;
  font-size: 12px;
  text-decoration: none;
  margin-right: 15px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("vroomvroom3.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-content {
  text-align: center;
  color: white;
}

.hero h1 {
  font-size: 40px;
  letter-spacing: 3px;
}

.hero p {
  margin: 10px 0;
}

.cta {
  display: inline-block;
  padding: 10px 25px;
  border: 1px solid white;
  margin-top: 10px;
  color: white;
}

/* MUSIC */
.music {
  background: #f2f2f2;
  padding: 80px 0;
}

.tracks {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.track {
  min-width: 180px;
}

.track img {
  width: 180px;
  height: 180px;
  object-fit: cover;
}

/* VIDEO */
.videos {
  padding: 80px 0;
  text-align: center;
}

.video {
  max-width: 400px;
  margin: auto;
}

</style>

</head>

<body>

<header class="header">
  <div class="header-inner">
    <div>
      <a href="#music">MUSIC</a>
      <a href="#videos">VIDEOS</a>
      <a href="#">SHOP</a>
      <a href="#">SUBSCRIBE</a>
      <a href="#">PRESS</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>VROOM VROOM</h1>
    <p>OUT MARCH 27</p>
    <a href="https://ffm.to/vroom-vroom" class="cta">LISTEN NOW</a>
  </div>
</section>

<section id="music" class="music">
  <div class="container">

    <h2>MUSIC</h2>

    <div class="tracks">

      <div class="track">
        <img src="vroomvroom1.jpg">
        <p>VROOM VROOM</p>
      </div>

      <div class="track">
        <img src="mixes.jpg">
        <p>Mixes</p>
      </div>

      <div class="track">
        <img src="fake.love_extendedc_cover.JPG">
        <p>Extended</p>
      </div>

      <div class="track">
        <img src="fake.love_acoustic_cover.JPG">
        <p>Acoustic</p>
      </div>

    </div>

  </div>
</section>

<section id="videos" class="videos">
  <div class="container">

    <h2>VIDEOS</h2>

    <div class="video">
      <img src="fake-love-acoustic-video.jpg">
      <p>Fake Love Acoustic</p>
    </div>

  </div>
</section>

</body>
</html>
