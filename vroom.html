<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Gryn</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="die_gryn_logo.png" class="logo">
    <nav>
      <a href="#music">MUSIC</a>
      <a href="#videos">VIDEOS</a>
      <a href="#">SHOP</a>
      <a href="#">SUBSCRIBE</a>
      <a href="#">PRESS</a>
    </nav>
  </div>

  <div class="header-right">
    <a href="#"><i class="fa-brands fa-instagram"></i></a>
    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
    <a href="#"><i class="fa-brands fa-youtube"></i></a>
    <a href="#"><i class="fa-brands fa-spotify"></i></a>
  </div>
</header>

<section class="hero">
  <div class="overlay">
    <h2>OUT MARCH 27</h2>
    <a href="https://ffm.to/vroom-vroom" target="_blank" class="cta">LISTEN NOW</a>
  </div>
</section>

<section id="music" class="music">
  <h3>MUSIC</h3>

  <div class="carousel">

    <button class="arrow-left" onclick="scrollLeft()">‹</button>

    <div class="track-container" id="trackContainer">

      <div class="track">
        <a href="https://ffm.to/vroom-vroom" target="_blank">
          <img src="vroomvroom1.jpg">
        </a>
        <p>VROOM VROOM</p>
      </div>

      <div class="track">
        <a href="https://ffm.to/fake-love-mixes" target="_blank">
          <img src="mixes.jpg">
        </a>
        <p>Fran Garro Mixes</p>
      </div>

      <div class="track">
        <a href="https://ffm.to/die-gryn-fake-love-extended-version" target="_blank">
          <img src="fake.love_extendedc_cover.JPG">
        </a>
        <p>Extended Version</p>
      </div>

      <div class="track">
        <a href="https://ffm.to/fake-love-acoustic" target="_blank">
          <img src="fake.love_acoustic_cover.JPG">
        </a>
        <p>Acoustic Version</p>
      </div>

      <div class="track">
        <a href="https://ffm.to/die-gryn-fake-love-schweigen-mix" target="_blank">
          <img src="fake.love_schweigen_cover.JPG">
        </a>
        <p>Schweigen Mix</p>
      </div>

    </div>

    <button class="arrow-right" onclick="scrollRight()">›</button>

  </div>
</section>

<section id="videos" class="videos">
  <h3>VIDEOS</h3>

  <div class="video">
    <a href="https://www.youtube.com/watch?v=fVC-PMoMJPs" target="_blank">
      <img src="fake-love-acoustic-video.jpg">
      <div class="play">▶</div>
    </a>
    <p>Fake Love Acoustic</p>
  </div>
</section>

<footer>
  <p>
    ©2026 Die Gryn |
    <a href="https://diegryn.com/privacy">Privacy</a>
    <a href="https://diegryn.com/cookies">Cookies</a>
    <a href="https://diegryn.com/terms">Terms</a>
    <a href="https://diegryn.com/press">Press</a>
  </p>
</footer>

<script>
function scrollLeft() {
  document.getElementById("trackContainer").scrollBy({ left: -250, behavior: "smooth" });
}
function scrollRight() {
  document.getElementById("trackContainer").scrollBy({ left: 250, behavior: "smooth" });
}
</script>

</body>
</html>
