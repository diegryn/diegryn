<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Gryn</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">

    <div class="nav-left">
      <img src="die_gryn_logo.png" class="logo">
      <nav>
        <a href="#music">MUSIC</a>
        <a href="#videos">VIDEOS</a>
        <a href="#">SHOP</a>
        <a href="#">SUBSCRIBE</a>
        <a href="#">PRESS</a>
      </nav>
    </div>

    <div class="nav-right">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
      <a href="#"><i class="fa-brands fa-youtube"></i></a>
      <a href="#"><i class="fa-brands fa-spotify"></i></a>
    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>VROOM VROOM</h1>
    <p>OUT MARCH 27</p>
    <a href="https://ffm.to/vroom-vroom" target="_blank" class="cta">LISTEN NOW</a>
  </div>
</section>

<!-- MUSIC -->
<section id="music" class="music">
  <div class="container">

    <h2>MUSIC</h2>

    <div class="carousel">
      <button class="arrow left" onclick="scrollLeft()">‹</button>

      <div class="tracks" id="tracks">

        <div class="track">
          <a href="https://ffm.to/vroom-vroom"><img src="vroomvroom1.jpg"></a>
          <p>VROOM VROOM</p>
        </div>

        <div class="track">
          <a href="https://ffm.to/fake-love-mixes"><img src="mixes.jpg"></a>
          <p>Fran Garro Mixes</p>
        </div>

        <div class="track">
          <a href="https://ffm.to/die-gryn-fake-love-extended-version"><img src="fake.love_extendedc_cover.JPG"></a>
          <p>Extended Version</p>
        </div>

        <div class="track">
          <a href="https://ffm.to/fake-love-acoustic"><img src="fake.love_acoustic_cover.JPG"></a>
          <p>Acoustic Version</p>
        </div>

        <div class="track">
          <a href="https://ffm.to/die-gryn-fake-love-schweigen-mix"><img src="fake.love_schweigen_cover.JPG"></a>
          <p>Schweigen Mix</p>
        </div>

      </div>

      <button class="arrow right" onclick="scrollRight()">›</button>
    </div>

  </div>
</section>

<!-- VIDEOS -->
<section id="videos" class="videos">
  <div class="container">

    <h2>VIDEOS</h2>

    <div class="video">
      <a href="https://www.youtube.com/watch?v=fVC-PMoMJPs">
        <img src="fake-love-acoustic-video.jpg">
        <div class="play">▶</div>
      </a>
      <p>Fake Love Acoustic</p>
    </div>

  </div>
</section>

<footer>
  <p>
    ©2026 Die Gryn |
    <a href="https://diegryn.com/privacy">Privacy</a>
    <a href="https://diegryn.com/cookies">Cookies</a>
    <a href="https://diegryn.com/terms">Terms</a>
    <a href="https://diegryn.com/press">Press</a>
  </p>
</footer>

<script>
function scrollLeft(){
  document.getElementById("tracks").scrollBy({left:-300, behavior:"smooth"});
}
function scrollRight(){
  document.getElementById("tracks").scrollBy({left:300, behavior:"smooth"});
}
</script>

</body>
</html>
